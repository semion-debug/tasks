<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Semion's Tasks</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0d1117; color: #e6edf3; padding: 20px; max-width: 800px; margin: 0 auto; }
  h1 { font-size: 1.6em; margin-bottom: 6px; color: #58a6ff; }
  .subtitle { color: #8b949e; font-size: 0.85em; margin-bottom: 24px; }
  .filters { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
  .filter-btn { padding: 6px 14px; border: 1px solid #30363d; background: #161b22; color: #8b949e; border-radius: 20px; cursor: pointer; font-size: 0.8em; transition: all 0.2s; }
  .filter-btn:hover, .filter-btn.active { background: #1f6feb; color: #fff; border-color: #1f6feb; }
  .task { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 16px; margin-bottom: 10px; transition: border-color 0.2s, opacity 0.3s; }
  .task:hover { border-color: #58a6ff; }
  .task.done-local { opacity: 0.5; }
  .task-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; gap: 10px; }
  .task-title { font-size: 1em; font-weight: 600; flex: 1; }
  .task-title.strikethrough { text-decoration: line-through; color: #484f58; }
  .task-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .btn-done { padding: 4px 12px; border-radius: 6px; border: 1px solid #3fb95060; background: #1a2e1a; color: #3fb950; font-size: 0.75em; cursor: pointer; transition: all 0.2s; }
  .btn-done:hover { background: #3fb950; color: #0d1117; }
  .btn-done.undone { border-color: #f0883e60; background: #1a1e2e; color: #f0883e; }
  .btn-done.undone:hover { background: #f0883e; color: #0d1117; }
  .btn-remove { padding: 4px 10px; border-radius: 6px; border: 1px solid #f8514940; background: #2e1a1a; color: #f85149; font-size: 0.75em; cursor: pointer; transition: all 0.2s; }
  .btn-remove:hover { background: #f85149; color: #fff; }
  .task-status { font-size: 0.75em; padding: 3px 10px; border-radius: 12px; font-weight: 500; white-space: nowrap; }
  .status-pending { background: #1a1e2e; color: #f0883e; border: 1px solid #f0883e40; }
  .status-done { background: #1a2e1a; color: #3fb950; border: 1px solid #3fb95040; }
  .status-overdue { background: #2e1a1a; color: #f85149; border: 1px solid #f8514940; }
  .task-meta { display: flex; gap: 16px; font-size: 0.8em; color: #8b949e; flex-wrap: wrap; }
  .category-badge { background: #1f2937; padding: 2px 8px; border-radius: 4px; font-size: 0.75em; text-transform: uppercase; letter-spacing: 0.5px; }
  .cat-dev { color: #bc8cff; border: 1px solid #bc8cff40; }
  .cat-daily { color: #58a6ff; border: 1px solid #58a6ff40; }
  .cat-business { color: #f0883e; border: 1px solid #f0883e40; }
  .cat-personal { color: #3fb950; border: 1px solid #3fb95040; }
  .task-notes { font-size: 0.85em; color: #8b949e; margin-top: 8px; font-style: italic; }
  .reminder-badge { color: #f0883e; font-size: 0.8em; }
  .reminder-badge::before { content: '🔔 '; }
  .empty { text-align: center; color: #484f58; padding: 40px; font-size: 0.95em; }
  .stats { display: flex; gap: 20px; margin-bottom: 20px; padding: 12px 16px; background: #161b22; border: 1px solid #30363d; border-radius: 8px; font-size: 0.85em; flex-wrap: wrap; }
  .stat-item { display: flex; gap: 6px; align-items: center; }
  .stat-num { font-weight: 700; color: #58a6ff; }
  .updated { text-align: center; color: #484f58; font-size: 0.7em; margin-top: 30px; }
  .hidden { display: none !important; }
</style>
</head>
<body>

<h1>📋 Tasks</h1>
<p class="subtitle">Semion's task dashboard</p>

<div class="stats" id="stats"></div>
<div class="filters" id="filters"></div>
<div id="tasks"></div>
<div class="updated" id="updated"></div>

<script>
let tasks = [];
let categories = [];
let activeFilter = 'all';
let doneLocally = JSON.parse(localStorage.getItem('doneTasks') || '[]');
let hiddenLocally = JSON.parse(localStorage.getItem('hiddenTasks') || '[]');

function getStatus(task) {
  if (doneLocally.includes(task.id) || task.status === 'done') return 'done';
  if (task.due && new Date(task.due) < new Date()) return 'overdue';
  return 'pending';
}

function formatDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const now = new Date();
  const today = now.toDateString();
  const tomorrow = new Date(now.getTime() + 86400000).toDateString();
  const dStr = d.toDateString();
  const time = d.toLocaleTimeString('en-IL', { hour: '2-digit', minute: '2-digit', hour12: false, timeZone: 'Asia/Jerusalem' });
  if (dStr === today) return 'Today ' + time;
  if (dStr === tomorrow) return 'Tomorrow ' + time;
  return d.toLocaleDateString('en-IL', { month: 'short', day: 'numeric', timeZone: 'Asia/Jerusalem' }) + ' ' + time;
}

function toggleDone(id) {
  if (doneLocally.includes(id)) {
    doneLocally = doneLocally.filter(i => i !== id);
  } else {
    doneLocally.push(id);
  }
  localStorage.setItem('doneTasks', JSON.stringify(doneLocally));
  render();
}

function removeTask(id) {
  hiddenLocally.push(id);
  localStorage.setItem('hiddenTasks', JSON.stringify(hiddenLocally));
  render();
}

function render() {
  const visible = tasks.filter(t => !hiddenLocally.includes(t.id));
  const total = visible.length;
  const pending = visible.filter(t => getStatus(t) === 'pending').length;
  const overdue = visible.filter(t => getStatus(t) === 'overdue').length;
  const done = visible.filter(t => getStatus(t) === 'done').length;

  document.getElementById('stats').innerHTML = `
    <div class="stat-item"><span class="stat-num">${total}</span> total</div>
    <div class="stat-item"><span class="stat-num">${pending}</span> pending</div>
    <div class="stat-item"><span class="stat-num" style="color:#f85149">${overdue}</span> overdue</div>
    <div class="stat-item"><span class="stat-num" style="color:#3fb950">${done}</span> done</div>
  `;

  const allCats = ['all', ...categories];
  document.getElementById('filters').innerHTML = allCats.map(c =>
    `<button class="filter-btn ${activeFilter === c ? 'active' : ''}" onclick="setFilter('${c}')">${c}</button>`
  ).join('');

  const filtered = visible.filter(t => activeFilter === 'all' || t.category === activeFilter);

  if (filtered.length === 0) {
    document.getElementById('tasks').innerHTML = '<div class="empty">No tasks here. Nice! 🎉</div>';
    return;
  }

  document.getElementById('tasks').innerHTML = filtered.map(t => {
    const status = getStatus(t);
    const isDone = status === 'done';
    const catClass = 'cat-' + (t.category || 'daily');
    return `
      <div class="task ${isDone ? 'done-local' : ''}">
        <div class="task-header">
          <span class="task-title ${isDone ? 'strikethrough' : ''}">${t.title}</span>
          <div class="task-actions">
            <button class="btn-done ${isDone ? 'undone' : ''}" onclick="toggleDone('${t.id}')">${isDone ? '↩ Undo' : '✓ Done'}</button>
            <button class="btn-remove" onclick="removeTask('${t.id}')">✕</button>
          </div>
          <span class="task-status status-${status}">${status}</span>
        </div>
        <div class="task-meta">
          <span class="category-badge ${catClass}">${t.category || 'uncategorized'}</span>
          ${t.due ? '<span>📅 ' + formatDate(t.due) + '</span>' : ''}
          ${t.reminder ? '<span class="reminder-badge">' + formatDate(t.reminder) + '</span>' : ''}
        </div>
        ${t.notes ? '<div class="task-notes">' + t.notes + '</div>' : ''}
      </div>
    `;
  }).join('');

  document.getElementById('updated').textContent = 'Last updated: ' + new Date().toLocaleTimeString();
}

function setFilter(cat) { activeFilter = cat; render(); }

async function loadData() {
  try {
    const res = await fetch('tasks.json?t=' + Date.now());
    const data = await res.json();
    tasks = data.tasks || [];
    categories = data.categories || [];
    render();
  } catch(e) {
    document.getElementById('tasks').innerHTML = '<div class="empty">Could not load tasks.</div>';
  }
}

loadData();
setInterval(loadData, 30000);
</script>
</body>
</html>
